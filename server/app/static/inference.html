<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SAM GEO Inference</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="top-nav" aria-label="Primary navigation">
        <a class="top-nav-link" href="/">Segmentation</a>
        <a class="top-nav-link" href="/preprocess">Preprocess</a>
        <a class="top-nav-link" href="/augmentation">Augmentation</a>
        <a class="top-nav-link" href="/training">Training</a>
        <a class="top-nav-link active" href="/inference">Inference</a>
      </nav>

      <section class="training-page">
        <header class="training-hero">
          <div class="brand">
            <span class="brand-mark"></span>
            <div>
              <h1>Checkpoint Inference</h1>
              <p>Sample FTW test data and inhouse patches to inspect pretraining segmentation quality.</p>
            </div>
          </div>
        </header>

        <section class="training-runner">
          <div class="panel-title">
            <span>Run Inference</span>
            <strong id="inferenceJobStatus">idle</strong>
          </div>
          <form id="inferenceJobForm" class="preprocess-form">
            <label class="field">
              <span>Checkpoint</span>
              <input id="checkpointInput" type="text" value="/home/nvme1/datasets/ftw_datasets/outputs/ftw_rgb_unet_effb3_pretrain_v1/checkpoints/best_val_boundary_f1.pt" />
            </label>
            <label class="field">
              <span>Config</span>
              <input id="configInput" type="text" value="/app/configs/pretrain/ftw_rgb_unet_effb3_pretrain_v1.yaml" />
            </label>
            <label class="field">
              <span>FTW metadata CSV</span>
              <input id="ftwMetadataInput" type="text" value="/home/nvme1/datasets/ftw_datasets/data/ftw/metadata/ftw_dataloader_index.csv" />
            </label>
            <label class="field">
              <span>Inhouse dataset dir</span>
              <input id="inhouseDatasetInput" type="text" value="/home/nvme1/datasets" />
            </label>
            <div class="field-grid">
              <label class="field">
                <span>FTW count</span>
                <input id="ftwCountInput" type="number" min="0" max="100" step="1" value="10" />
              </label>
              <label class="field">
                <span>Inhouse count</span>
                <input id="inhouseCountInput" type="number" min="0" max="100" step="1" value="10" />
              </label>
            </div>
            <label class="field">
              <span>Seed</span>
              <input id="seedInput" type="number" step="1" value="42" />
            </label>
            <div class="preprocess-actions">
              <button id="startInferenceButton" class="secondary-button" type="submit">Start inference</button>
              <button id="cancelInferenceButton" class="secondary-button" type="button" disabled>Cancel</button>
            </div>
          </form>
          <div class="progress-box">
            <div class="progress-header">
              <span id="inferenceJobStage">queued</span>
              <strong id="inferenceJobPercent">0%</strong>
            </div>
            <div class="progress-track">
              <div id="inferenceJobBar" class="progress-fill"></div>
            </div>
            <div id="inferenceJobMessage" class="progress-message">No inference job running.</div>
            <code id="inferenceJobId" class="job-id"></code>
          </div>
          <div id="inferenceOutputs" class="outputs-list"></div>
          <div id="inferenceLogs" class="job-logs"></div>
        </section>

        <section class="training-dashboard">
          <div class="panel-title">
            <span>Visual Check</span>
            <strong id="summaryStatus">waiting</strong>
          </div>
          <div class="inference-tabs" role="tablist">
            <button class="toggle active" type="button" data-source="all">All</button>
            <button class="toggle" type="button" data-source="ftw">FTW</button>
            <button class="toggle" type="button" data-source="inhouse">Inhouse</button>
          </div>
          <div id="inferenceGrid" class="inference-grid"></div>
        </section>
      </section>
    </main>
    <dialog id="imageDialog" class="image-dialog">
      <div class="image-dialog-body">
        <div class="image-dialog-header">
          <strong id="imageDialogTitle">Preview</strong>
          <button id="imageDialogClose" class="toggle" type="button">Close</button>
        </div>
        <img id="imageDialogImage" alt="Large preview" />
      </div>
    </dialog>
    <div id="toast" class="toast hidden" role="status"></div>
    <script src="/static/inference.js"></script>
  </body>
</html>
